<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📖 FlashMed - Tarjetas de Estudio</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --bg: #f4f7f4;
            --card: #ffffff;
            --card-shadow: rgba(80, 110, 90, 0.08);
            --primary: #e8a0b4;
            --primary-dark: #d4809a;
            --secondary: #b4a7d6;
            --secondary-dark: #9580c2;
            --accent: #e07a5f;
            --accent-light: #f2a07a;
            --text: #3d4a42;
            --text-muted: #7a8a80;
            --border: #f0d4db;
            --gradient-primary: linear-gradient(135deg, #f0b8c8 0%, #e8a0b4 100%);
            --gradient-accent: linear-gradient(135deg, #e8967a 0%, #e07a5f 100%);
        }
        
        body {
            font-family: 'Quicksand', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 1rem;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.25rem;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }
        
        /* Formulario para agregar */
        .add-card {
            background: var(--card);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 20px var(--card-shadow);
            border: 1px solid var(--border);
        }
        
        .add-card h2 {
            font-size: 1rem;
            color: var(--primary-dark);
            margin-bottom: 1rem;
            font-weight: 700;
        }
        
        input, textarea, select {
            width: 100%;
            background: #fafcfb;
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 0.85rem;
            color: var(--text);
            font-size: 1rem;
            margin-bottom: 0.75rem;
            transition: all 0.3s;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(91, 138, 114, 0.15);
        }
        
        textarea {
            min-height: 80px;
            resize: vertical;
        }
        
        select {
            cursor: pointer;
        }
        
        .btn {
            background: var(--gradient-primary);
            color: #fff;
            border: none;
            padding: 0.85rem 1.5rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(91, 138, 114, 0.25);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(91, 138, 114, 0.35);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-delete {
            background: var(--gradient-accent);
            color: #fff;
        }
        
        /* Stats */
        .stats {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        
        .stat {
            background: var(--card);
            padding: 1rem 0.5rem;
            border-radius: 14px;
            flex: 1;
            text-align: center;
            box-shadow: 0 4px 16px var(--card-shadow);
            border: 1px solid var(--border);
        }
        
        .stat-value {
            font-size: 1.6rem;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 600;
        }
        
        /* Filtros */
        .filters {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            background: var(--card);
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .filter-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        
        .filter-btn:hover:not(.active) {
            border-color: var(--primary);
            color: var(--primary-dark);
        }
        
        /* Lista de tareas */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
        }
        
        .task {
            background: var(--card);
            border-radius: 14px;
            padding: 1.1rem;
            display: flex;
            gap: 0.85rem;
            align-items: flex-start;
            transition: all 0.3s;
            box-shadow: 0 4px 16px var(--card-shadow);
            border: 1px solid var(--border);
        }
        
        .task:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--card-shadow);
        }
        
        .task.completed {
            opacity: 0.6;
        }
        
        .task.completed .task-question {
            text-decoration: line-through;
            color: var(--text-muted);
        }
        
        .task-checkbox {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 14px;
            transition: all 0.2s;
            background: transparent;
        }
        
        .task.completed .task-checkbox {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        
        .task-content {
            flex: 1;
        }
        
        .task-question {
            font-weight: 700;
            margin-bottom: 0.3rem;
            color: var(--text);
        }
        
        .task-answer {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
            line-height: 1.4;
        }
        
        .task-meta {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
        }
        
        .task-tag {
            background: linear-gradient(135deg, #e8f3ec 0%, #d4e8dc 100%);
            color: var(--primary-dark);
            padding: 0.2rem 0.6rem;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .task-tag.Enfermería { background: linear-gradient(135deg, #fce4ec 0%, #f8bbd9 100%); color: #c2185b; }
        .task-tag.Anatomía { background: linear-gradient(135deg, #e1f5fe 0%, #b3e5fc 100%); color: #0288d1; }
        .task-tag.Farmacología { background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%); color: #388e3c; }
        .task-tag.Fisiología { background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%); color: #f57c00; }
        .task-tag.Patología { background: linear-gradient(135deg, #f3e5f5 0%, #e1bee7 100%); color: #7b1fa2; }
        .task-tag.Enfermería\20\20Comunitaria { background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 100%); color: #00838f; }
        .task-tag.Enfermería\20\20Pediátrica { background: linear-gradient(135deg, #fff8e1 0%, #ffecb3 100%); color: #ff8f00; }
        .task-tag.Enfermería\20\20Ginecológica { background: linear-gradient(135deg, #fce4ec 0%, #f48fb1 100%); color: #ad1457; }
        .task-tag.Ética { background: linear-gradient(135deg, #efebe9 0%, #d7ccc8 100%); color: #5d4037; }
        
        .task-actions {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }
        
        .task-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0.3rem;
            transition: all 0.2s;
        }
        
        .task-btn:hover {
            color: var(--primary-dark);
            transform: scale(1.1);
        }
        
        /* Empty state */
        .empty {
            text-align: center;
            color: var(--text-muted);
            padding: 3rem 1rem;
        }
        
        .empty-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
        
        /* Modal de edición */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(61, 74, 66, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--card);
            border-radius: 20px;
            padding: 1.75rem;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(61, 74, 66, 0.2);
        }
        
        .modal h2 {
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1.25rem;
            font-size: 1.4rem;
        }
        
        .modal-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.25rem;
        }
        
        .modal-actions .btn {
            flex: 1;
        }
        
        /* Instructions */
        .instructions {
            background: var(--card);
            border-radius: 14px;
            padding: 1rem;
            margin-bottom: 1.25rem;
            text-align: center;
            box-shadow: 0 4px 16px var(--card-shadow);
            border: 1px solid var(--border);
        }
        
        .instructions p {
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        
        .sync-status {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            margin-left: 0.5rem;
        }
        
        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ccc;
        }
        
        .sync-dot.synced { background: #5b8a72; }
        .sync-dot.syncing { background: #e07a5f; animation: pulse 1s infinite; }
        .sync-dot.error { background: #e74c3c; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Study Button */
        .study-btn {
            background: var(--gradient-accent);
            color: #fff;
            margin-top: 0.75rem;
            box-shadow: 0 4px 12px rgba(224, 122, 95, 0.3);
        }
        
        /* Study Mode */
        .study-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg);
            z-index: 2000;
            flex-direction: column;
        }
        
        .study-modal.active {
            display: flex;
        }
        
        .study-header {
            background: var(--card);
            padding: 1.25rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 16px var(--card-shadow);
            border-bottom: 1px solid var(--border);
        }
        
        .study-header h2 {
            color: var(--primary-dark);
            font-size: 1.2rem;
            font-weight: 700;
        }
        
        .study-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
            transition: color 0.2s;
        }
        
        .study-close:hover {
            color: var(--primary-dark);
        }
        
        .study-progress {
            background: var(--card);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: 0 2px 8px var(--card-shadow);
            border-bottom: 1px solid var(--border);
        }
        
        .study-progress-bar {
            flex: 1;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .study-progress-fill {
            height: 100%;
            background: var(--gradient-primary);
            transition: width 0.4s ease;
            border-radius: 3px;
        }
        
        .study-counter {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
        }
        
        .study-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            gap: 1.5rem;
        }
        
        /* Study Card - Horizontal Layout */
        .study-card {
            background: var(--card);
            border-radius: 16px;
            width: 100%;
            max-width: 560px;
            box-shadow: 0 8px 32px var(--card-shadow);
            border: 1px solid var(--border);
            overflow: hidden;
        }
        
        .study-card-top {
            background: var(--gradient-primary);
            padding: 0.75rem 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .study-card-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.9);
        }
        
        .study-card-subject {
            font-size: 0.75rem;
            font-weight: 600;
            color: rgba(255,255,255,0.85);
            background: rgba(255,255,255,0.2);
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
        }
        
        .study-card-content {
            padding: 1.75rem 1.5rem;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .study-card-question {
            font-size: 1.25rem;
            color: var(--text);
            text-align: center;
            line-height: 1.5;
            font-weight: 700;
        }
        
        .study-card-answer {
            font-size: 1.1rem;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.6;
            display: none;
        }
        
        .study-card-answer.visible {
            display: block;
        }
        
        .study-card-divider {
            width: 50px;
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            margin: 1rem auto;
        }
        
        /* Study Actions - Below card */
        .study-actions {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
            max-width: 560px;
        }
        
        .study-actions .btn {
            width: auto;
            min-width: 150px;
            flex: 1;
        }
        
        .study-btn-show {
            background: var(--secondary);
            color: #fff;
            box-shadow: 0 4px 16px rgba(139, 126, 184, 0.35);
        }
        
        .study-btn-show:hover {
            background: var(--secondary-dark);
        }
        
        .study-btn-next {
            background: var(--gradient-primary);
            color: #fff;
            box-shadow: 0 4px 16px rgba(91, 138, 114, 0.35);
        }
        
        .study-btn-shuffle {
            background: var(--secondary);
            color: #fff;
            box-shadow: 0 4px 16px rgba(180, 167, 214, 0.35);
        }
        
        .study-finish {
            text-align: center;
            padding: 2rem;
        }
        
        .study-finish-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        
        .study-finish h2 {
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.8rem;
            margin-bottom: 0.75rem;
        }
        
        .study-finish p {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
        }
        
        .study-empty {
            text-align: center;
            color: var(--text-muted);
            padding: 3rem;
        }
        
        .study-launch-btn {
            background: var(--gradient-primary) !important;
            color: #fff !important;
            box-shadow: 0 4px 16px rgba(91, 138, 114, 0.3) !important;
        }
        
        /* Flip hint */
        .flip-hint {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-top: 0.5rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📖 FlashMed</h1>
        <p class="subtitle">Tarjetas de estudio</p>
        
        <!-- Instrucciones -->
        <div class="instructions">
            <p>💾 Datos en Firebase <span class="sync-status"><span class="sync-dot" id="syncDot"></span><span id="syncText">Conectando...</span></span></p>
        </div>
        
        <!-- Stats -->
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="pendingCount">0</div>
                <div class="stat-label">Por estudiar</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="completedCount">0</div>
                <div class="stat-label">Completadas</div>
            </div>
        </div>
        
        <!-- Agregar tarea -->
        <div class="add-card">
            <h2>✨ Nueva Tarjeta</h2>
            <input type="text" id="questionInput" placeholder="Pregunta o concepto...">
            <textarea id="answerInput" placeholder="Respuesta o definición..."></textarea>
            <select id="subjectInput">
                <option value="Enfermería">Enfermería</option>
                <option value="Anatomía">Anatomía</option>
                <option value="Farmacología">Farmacología</option>
                <option value="Fisiología">Fisiología</option>
                <option value="Patología">Patología</option>
                <option value="Enfermería Comunitaria">Enfermería Comunitaria</option>
                <option value="Enfermería Pediátrica">Enfermería Pediátrica</option>
                <option value="Enfermería Ginecológica">Enfermería Ginecológica</option>
                <option value="Ética">Ética</option>
                <option value="General">General</option>
            </select>
            <button class="btn" onclick="addTask()">➕ Agregar Tarjeta</button>
        </div>
        
        <!-- Filtros -->
        <div class="filters">
            <button class="filter-btn active" onclick="filterTasks('all')">Todas</button>
            <button class="filter-btn" onclick="filterTasks('pending')">Por estudiar</button>
            <button class="filter-btn" onclick="filterTasks('completed')">Completadas</button>
            <button class="filter-btn" onclick="filterTasks('subject')">Por Materia</button>
        </div>
        
        <!-- Lista -->
        <div class="task-list" id="taskList">
            <div class="empty">
                <div class="empty-icon">📋</div>
                <p>Cargando...</p>
            </div>
        </div>
    </div>
    
    <!-- Modal de edición -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <h2>✏️ Editar Tarjeta</h2>
            <input type="hidden" id="editId">
            <input type="text" id="editQuestion" placeholder="Pregunta o concepto...">
            <textarea id="editAnswer" placeholder="Respuesta o definición..."></textarea>
            <select id="editSubject">
                <option value="Enfermería">Enfermería</option>
                <option value="Anatomía">Anatomía</option>
                <option value="Farmacología">Farmacología</option>
                <option value="Fisiología">Fisiología</option>
                <option value="Patología">Patología</option>
                <option value="Enfermería Comunitaria">Enfermería Comunitaria</option>
                <option value="Enfermería Pediátrica">Enfermería Pediátrica</option>
                <option value="Enfermería Ginecológica">Enfermería Ginecológica</option>
                <option value="Ética">Ética</option>
                <option value="General">General</option>
            </select>
            <div class="modal-actions">
                <button class="btn" onclick="saveEdit()">💾 Guardar</button>
                <button class="btn btn-delete" onclick="closeModal()">✕</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get, set, push, remove, update, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCg_o2Iax1zkTToZLDfEh6XHGz_5w8Ey5g",
            authDomain: "flashmed-87e1b.firebaseapp.com",
            databaseURL: "https://flashmed-87e1b-default-rtdb.firebaseio.com",
            projectId: "flashmed-87e1b",
            storageBucket: "flashmed-87e1b.firebasestorage.app",
            messagingSenderId: "345046994653",
            appId: "1:345046994653:web:67cb110ee172219166d534"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // Make db available globally
        window.db = db;
        window.ref = ref;
        window.get = get;
        window.set = set;
        window.push = push;
        window.remove = remove;
        window.update = update;
        window.onValue = onValue;
        
        // Notify app is ready
        window.firebaseReady = true;
        
        // Dispatch event when Firebase is loaded
        window.dispatchEvent(new Event('firebaseReady'));
    </script>

    <script>
        // ============== DATA MANAGEMENT WITH FIREBASE ==============
        let tasks = [];
        let firebaseReady = false;
        let currentFilter = 'all';
        
        const syncDot = document.getElementById('syncDot');
        const syncText = document.getElementById('syncText');
        
        function setSyncStatus(status, message) {
            syncDot.className = 'sync-dot ' + status;
            syncText.textContent = message;
        }
        
        // Wait for Firebase before initializing
        window.addEventListener('firebaseReady', () => {
            firebaseReady = true;
            setSyncStatus('syncing', 'Sincronizando...');
            loadTasksFromFirebase();
        });
        
        // Fallback if Firebase takes too long
        setTimeout(() => {
            if (!firebaseReady) {
                setSyncStatus('error', 'Error de conexión');
            }
        }, 10000);

        async function loadTasksFromFirebase() {
            try {
                const tasksRef = ref(db, 'tasks');
                const snapshot = await get(tasksRef);
                
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    tasks = Object.keys(data).map(key => ({ id: key, ...data[key] }));
                } else {
                    tasks = [];
                }
                
                setSyncStatus('synced', 'Sincronizado');
                renderTasks();
            } catch (error) {
                console.error('Error loading tasks:', error);
                setSyncStatus('error', 'Error de sync');
            }
        }

        async function saveTasksToFirebase() {
            try {
                setSyncStatus('syncing', 'Guardando...');
                const tasksRef = ref(db, 'tasks');
                const tasksData = {};
                tasks.forEach(t => {
                    tasksData[t.id] = { question: t.question, answer: t.answer, subject: t.subject, completed: t.completed, createdAt: t.createdAt };
                });
                await set(tasksRef, tasksData);
                setSyncStatus('synced', 'Sincronizado');
            } catch (error) {
                console.error('Error saving tasks:', error);
                setSyncStatus('error', 'Error al guardar');
            }
        }
        
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }
        
        // ============== TASK OPERATIONS ==============
        async function addTask() {
            const question = document.getElementById('questionInput').value.trim();
            const answer = document.getElementById('answerInput').value.trim();
            const subject = document.getElementById('subjectInput').value;
            
            if (!question) {
                alert('Por favor ingresa una pregunta');
                return;
            }
            
            const newTask = {
                id: generateId(),
                question,
                answer,
                subject,
                completed: false,
                createdAt: new Date().toISOString()
            };
            
            tasks.push(newTask);
            renderTasks();
            await saveTasksToFirebase();
            
            document.getElementById('questionInput').value = '';
            document.getElementById('answerInput').value = '';
        }
        
        async function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                renderTasks();
                await saveTasksToFirebase();
            }
        }
        
        async function deleteTask(id) {
            if (!confirm('¿Eliminar esta tarjeta?')) return;
            
            tasks = tasks.filter(t => t.id !== id);
            renderTasks();
            await saveTasksToFirebase();
        }
        
        function openEditModal(id) {
            const task = tasks.find(t => t.id === id);
            if (!task) return;
            
            document.getElementById('editId').value = id;
            document.getElementById('editQuestion').value = task.question;
            document.getElementById('editAnswer').value = task.answer;
            document.getElementById('editSubject').value = task.subject;
            
            document.getElementById('editModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('editModal').classList.remove('active');
        }
        
        async function saveEdit() {
            const id = document.getElementById('editId').value;
            const task = tasks.find(t => t.id === id);
            
            if (task) {
                task.question = document.getElementById('editQuestion').value.trim();
                task.answer = document.getElementById('editAnswer').value.trim();
                task.subject = document.getElementById('editSubject').value;
                renderTasks();
                await saveTasksToFirebase();
                closeModal();
            }
        }
        
        function filterTasks(filter) {
            if (filter === 'subject') {
                const subjects = [...new Set(tasks.map(t => t.subject))].sort();
                if (subjects.length === 0) {
                    alert('No hay materias para filtrar');
                    return;
                }
                const selected = prompt('Selecciona una materia:\n' + subjects.map((s, i) => `${i + 1}. ${s}`).join('\n') + '\n\nIngresa el número:');
                if (!selected) return;
                const index = parseInt(selected) - 1;
                if (index >= 0 && index < subjects.length) {
                    currentFilter = { type: 'subject', value: subjects[index] };
                } else {
                    return;
                }
            } else {
                currentFilter = filter;
            }
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            renderTasks();
        }
        
        function getFilteredTasks() {
            if (currentFilter === 'all') return tasks;
            if (currentFilter === 'pending') return tasks.filter(t => !t.completed);
            if (currentFilter === 'completed') return tasks.filter(t => t.completed);
            if (currentFilter.type === 'subject') return tasks.filter(t => t.subject === currentFilter.value);
            
            return tasks;
        }
        
        // ============== RENDER ==============
        function renderTasks() {
            const filtered = getFilteredTasks();
            const taskList = document.getElementById('taskList');
            
            document.getElementById('totalCount').textContent = tasks.length;
            document.getElementById('pendingCount').textContent = tasks.filter(t => !t.completed).length;
            document.getElementById('completedCount').textContent = tasks.filter(t => t.completed).length;
            
            if (filtered.length === 0) {
                taskList.innerHTML = `
                    <div class="empty">
                        <div class="empty-icon">📋</div>
                        <p>${currentFilter === 'all' ? 'No hay tarjetas aún.<br>¡Agrega tu primera tarjeta!' : 'No hay tarjetas en esta categoría'}</p>
                    </div>
                `;
                return;
            }
            
            const pendingCount = tasks.filter(t => !t.completed).length;
            
            taskList.innerHTML = filtered.map(task => `
                <div class="task ${task.completed ? 'completed' : ''}">
                    <div class="task-checkbox" onclick="toggleTask('${task.id}')">
                        ${task.completed ? '✓' : ''}
                    </div>
                    <div class="task-content" onclick="toggleTask('${task.id}')">
                        <div class="task-question">${escapeHtml(task.question)}</div>
                        ${task.answer ? `<div class="task-answer">${escapeHtml(task.answer)}</div>` : ''}
                        <div class="task-meta">
                            <span class="task-tag ${task.subject}">${task.subject}</span>
                        </div>
                    </div>
                    <div class="task-actions">
                        <button class="task-btn" onclick="openEditModal('${task.id}')" title="Editar">✏️</button>
                        <button class="task-btn" onclick="deleteTask('${task.id}')" title="Eliminar">🗑️</button>
                    </div>
                </div>
            `).join('');
            
            // Study launch button
            const existingStudyBtn = document.querySelector('.study-launch-btn');
            if (existingStudyBtn) existingStudyBtn.remove();
            
            if (pendingCount > 0) {
                const statsDiv = document.querySelector('.stats');
                const studyLaunchBtn = document.createElement('button');
                studyLaunchBtn.className = 'btn study-launch-btn';
                studyLaunchBtn.textContent = `📖 Estudiar ${pendingCount} tarjetas`;
                studyLaunchBtn.onclick = () => startStudyMode();
                statsDiv.parentNode.insertBefore(studyLaunchBtn, statsDiv.nextSibling);
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ============== KEYBOARD SHORTCUTS ==============
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                const active = document.activeElement;
                if (active.id === 'questionInput' || active.id === 'answerInput') {
                    addTask();
                }
            }
            if (e.key === 'Escape') {
                closeModal();
                closeStudyMode();
            }
        });
        
        // ============== STUDY MODE ==============
        let studyTasks = [];
        let studyIndex = 0;
        let isFlipped = false;

        function startStudyMode(shuffle = false) {
            const pending = tasks.filter(t => !t.completed);
            
            if (pending.length === 0) {
                alert('No hay tarjetas para estudiar');
                return;
            }
            
            studyTasks = shuffle ? [...pending].sort(() => Math.random() - 0.5) : [...pending];
            studyIndex = 0;
            isFlipped = false;
            
            document.getElementById('studyTitle').textContent = shuffle ? '🔀 Estudio Aleatorio' : '📖 Modo Estudio';
            document.getElementById('studyModal').classList.add('active');
            
            renderStudyCard();
        }

        function renderStudyCard() {
            const container = document.getElementById('studyContainer');
            const task = studyTasks[studyIndex];
            const total = studyTasks.length;
            
            document.getElementById('studyCounter').textContent = `${studyIndex + 1} / ${total}`;
            document.getElementById('studyProgressFill').style.width = `${((studyIndex + 1) / total) * 100}%`;
            
            if (!task) {
                container.innerHTML = `
                    <div class="study-finish">
                        <div class="study-finish-icon">🎉</div>
                        <h2>¡Terminaste!</h2>
                        <p>Completaste las ${total} tarjetas</p>
                        <button class="btn" onclick="closeStudyMode()">← Volver</button>
                    </div>
                `;
                document.getElementById('studyProgressFill').style.width = '100%';
                return;
            }
            
            isFlipped = false;
            
            container.innerHTML = `
                <div class="study-card">
                    <div class="study-card-top">
                        <span class="study-card-label">Pregunta</span>
                        <span class="study-card-subject">${task.subject}</span>
                    </div>
                    <div class="study-card-content">
                        <div class="study-card-question" id="studyQuestion">${escapeHtml(task.question)}</div>
                        <div class="study-card-divider" id="studyDivider" style="display:none"></div>
                        <div class="study-card-answer" id="studyAnswer">${escapeHtml(task.answer)}</div>
                    </div>
                </div>
                <p class="flip-hint" id="flipHint">Toca "Mostrar respuesta" para ver</p>
                <div class="study-actions">
                    <button class="btn study-btn-show" id="btnShow" onclick="showAnswer()">👀 Mostrar Respuesta</button>
                    <button class="btn study-btn-shuffle" onclick="startStudyMode(true)">🔀 Aleatorio</button>
                </div>
            `;
        }
        
        function showAnswer() {
            if (!isFlipped) {
                document.getElementById('studyAnswer').classList.add('visible');
                document.getElementById('studyDivider').style.display = 'block';
                document.getElementById('flipHint').style.display = 'none';
                document.getElementById('btnShow').outerHTML = `<button class="btn study-btn-next" onclick="nextCard()">→ Siguiente</button>`;
                isFlipped = true;
            }
        }
        
        function nextCard() {
            studyIndex++;
            renderStudyCard();
        }

        function closeStudyMode() {
            document.getElementById('studyModal').classList.remove('active');
        }
    </script>

    <!-- Study Mode Modal -->
    <div class="study-modal" id="studyModal">
        <div class="study-header">
            <h2 id="studyTitle">📖 Modo Estudio</h2>
            <button class="study-close" onclick="closeStudyMode()">✕</button>
        </div>
        <div class="study-progress">
            <span class="study-counter" id="studyCounter">0 / 0</span>
            <div class="study-progress-bar">
                <div class="study-progress-fill" id="studyProgressFill" style="width: 0%"></div>
            </div>
        </div>
        <div class="study-container" id="studyContainer">
        </div>
    </div>
</body>
</html>
