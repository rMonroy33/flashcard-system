<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📖 FlashMed - Tarjetas de Estudio</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --bg: #fdf6f0;
            --card: #ffffff;
            --card-shadow: rgba(180, 100, 120, 0.1);
            --accent: #e8a0b4;
            --accent-dark: #d4809a;
            --accent-gold: #c9a86c;
            --accent-mint: #7ec8a3;
            --accent-lavender: #b4a7d6;
            --text: #4a3f44;
            --text-muted: #8a7f85;
            --gradient-rose: linear-gradient(135deg, #f8e1e7 0%, #fdf6f0 100%);
            --gradient-gold: linear-gradient(135deg, #f5e6d3 0%, #c9a86c 100%);
        }
        
        body {
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--gradient-rose);
            color: var(--text);
            min-height: 100vh;
            padding: 1rem;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            background: var(--gradient-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.25rem;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        
        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }
        
        /* Decorative heart icon */
        .heart-decoration {
            color: var(--accent);
        }
        
        /* Formulario para agregar */
        .add-card {
            background: var(--card);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 20px var(--card-shadow);
            border: 1px solid rgba(232, 160, 180, 0.2);
        }
        
        .add-card h2 {
            font-size: 1rem;
            color: var(--accent-dark);
            margin-bottom: 1rem;
            font-weight: 700;
        }
        
        input, textarea, select {
            width: 100%;
            background: #fef9f5;
            border: 2px solid #f0e6e0;
            border-radius: 12px;
            padding: 0.85rem;
            color: var(--text);
            font-size: 1rem;
            margin-bottom: 0.75rem;
            transition: all 0.3s;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(232, 160, 180, 0.2);
        }
        
        textarea {
            min-height: 80px;
            resize: vertical;
        }
        
        select {
            cursor: pointer;
        }
        
        .btn {
            background: var(--gradient-gold);
            color: #5a4a3a;
            border: none;
            padding: 0.85rem 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            width: 100%;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(201, 168, 108, 0.3);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(201, 168, 108, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-delete {
            background: linear-gradient(135deg, #ffb4b4 0%, #ff8a8a 100%);
            color: #fff;
        }
        
        /* Stats */
        .stats {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        
        .stat {
            background: var(--card);
            padding: 1rem 0.5rem;
            border-radius: 16px;
            flex: 1;
            text-align: center;
            box-shadow: 0 4px 16px var(--card-shadow);
            border: 1px solid rgba(232, 160, 180, 0.15);
        }
        
        .stat-value {
            font-size: 1.6rem;
            font-weight: 800;
            background: var(--gradient-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 600;
        }
        
        /* Filtros */
        .filters {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            background: var(--card);
            color: var(--text-muted);
            border: 1px solid #f0e6e0;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .filter-btn.active {
            background: var(--accent-dark);
            color: #fff;
            border-color: var(--accent-dark);
        }
        
        .filter-btn:hover:not(.active) {
            border-color: var(--accent);
            color: var(--accent-dark);
        }
        
        /* Lista de tareas */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
        }
        
        .task {
            background: var(--card);
            border-radius: 16px;
            padding: 1.1rem;
            display: flex;
            gap: 0.85rem;
            align-items: flex-start;
            transition: all 0.3s;
            box-shadow: 0 4px 16px var(--card-shadow);
            border: 1px solid rgba(232, 160, 180, 0.1);
        }
        
        .task:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--card-shadow);
        }
        
        .task.completed {
            opacity: 0.6;
        }
        
        .task.completed .task-question {
            text-decoration: line-through;
            color: var(--text-muted);
        }
        
        .task-checkbox {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 14px;
            transition: all 0.2s;
            background: transparent;
        }
        
        .task.completed .task-checkbox {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        
        .task-content {
            flex: 1;
        }
        
        .task-question {
            font-weight: 700;
            margin-bottom: 0.3rem;
            color: var(--text);
        }
        
        .task-answer {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
            line-height: 1.4;
        }
        
        .task-meta {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
        }
        
        .task-tag {
            background: linear-gradient(135deg, #f8e1e7 0%, #f0d4db 100%);
            color: var(--accent-dark);
            padding: 0.2rem 0.6rem;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .task-tag.anatomia { background: linear-gradient(135deg, #e1f5fe 0%, #b3e5fc 100%); color: #0288d1; }
        .task-tag.farmacologia { background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%); color: #388e3c; }
        .task-tag.enfermeria { background: linear-gradient(135deg, #fce4ec 0%, #f8bbd9 100%); color: #c2185b; }
        .task-tag.fisiologia { background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%); color: #f57c00; }
        .task-tag.patologia { background: linear-gradient(135deg, #f3e5f5 0%, #e1bee7 100%); color: #7b1fa2; }
        
        .task-actions {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }
        
        .task-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0.3rem;
            transition: all 0.2s;
        }
        
        .task-btn:hover {
            color: var(--accent-dark);
            transform: scale(1.1);
        }
        
        /* Empty state */
        .empty {
            text-align: center;
            color: var(--text-muted);
            padding: 3rem 1rem;
        }
        
        .empty-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
        
        /* Modal de edición */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(74, 63, 68, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--card);
            border-radius: 20px;
            padding: 1.75rem;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(74, 63, 68, 0.3);
        }
        
        .modal h2 {
            background: var(--gradient-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1.25rem;
            font-size: 1.4rem;
        }
        
        .modal-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.25rem;
        }
        
        .modal-actions .btn {
            flex: 1;
        }
        
        /* Instructions */
        .instructions {
            background: var(--card);
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1.25rem;
            text-align: center;
            box-shadow: 0 4px 16px var(--card-shadow);
            border: 1px solid rgba(232, 160, 180, 0.15);
        }
        
        .instructions p {
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        
        .instructions strong {
            color: var(--accent-dark);
        }
        
        /* Study Button */
        .study-btn {
            background: linear-gradient(135deg, #7ec8a3 0%, #5db382 100%);
            color: #fff;
            margin-top: 0.75rem;
            box-shadow: 0 4px 12px rgba(126, 200, 163, 0.3);
        }
        
        /* Study Mode */
        .study-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--gradient-rose);
            z-index: 2000;
            flex-direction: column;
        }
        
        .study-modal.active {
            display: flex;
        }
        
        .study-header {
            background: var(--card);
            padding: 1.25rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 16px var(--card-shadow);
        }
        
        .study-header h2 {
            color: var(--accent-dark);
            font-size: 1.2rem;
            font-weight: 700;
        }
        
        .study-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
            transition: color 0.2s;
        }
        
        .study-close:hover {
            color: var(--accent-dark);
        }
        
        .study-progress {
            background: var(--card);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: 0 2px 8px var(--card-shadow);
        }
        
        .study-progress-bar {
            flex: 1;
            height: 6px;
            background: #f0e6e0;
            border-radius: 3px;
            overflow: hidden;
        }
        
        .study-progress-fill {
            height: 100%;
            background: var(--gradient-gold);
            transition: width 0.4s ease;
            border-radius: 3px;
        }
        
        .study-counter {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
        }
        
        .study-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        
        /* Study Card - Flip Effect */
        .study-card-wrapper {
            perspective: 1000px;
            width: 100%;
            max-width: 480px;
        }
        
        .study-card {
            background: var(--card);
            border-radius: 24px;
            padding: 0;
            width: 100%;
            min-height: 320px;
            box-shadow: 0 12px 40px var(--card-shadow);
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(232, 160, 180, 0.2);
        }
        
        .study-card.flipped {
            transform: rotateY(180deg);
        }
        
        .study-card-front,
        .study-card-back {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            backface-visibility: hidden;
            border-radius: 24px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .study-card-front {
            background: var(--card);
        }
        
        .study-card-back {
            background: linear-gradient(145deg, #fef9f5 0%, #f8e8ec 100%);
            transform: rotateY(180deg);
            border: 2px solid var(--accent);
        }
        
        .study-card-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }
        
        .study-card-front .study-card-label {
            color: var(--accent-dark);
        }
        
        .study-card-back .study-card-label {
            color: var(--accent-dark);
        }
        
        .study-card-question {
            font-size: 1.4rem;
            color: var(--text);
            text-align: center;
            line-height: 1.5;
            font-weight: 700;
        }
        
        .study-card-answer {
            font-size: 1.15rem;
            color: var(--text);
            text-align: center;
            line-height: 1.6;
        }
        
        .study-card-divider {
            width: 60px;
            height: 3px;
            background: var(--gradient-gold);
            border-radius: 2px;
            margin: 1.5rem 0;
        }
        
        .study-card-tag {
            position: absolute;
            bottom: 1.25rem;
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd9 100%);
            color: var(--accent-dark);
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .study-actions {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 1.5rem;
            width: 100%;
            max-width: 480px;
        }
        
        .study-actions .btn {
            width: auto;
            min-width: 150px;
            flex: 1;
        }
        
        .study-btn-show {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            color: #fff;
            box-shadow: 0 4px 16px rgba(232, 160, 180, 0.4);
        }
        
        .study-btn-next {
            background: linear-gradient(135deg, #7ec8a3 0%, #5db382 100%);
            color: #fff;
            box-shadow: 0 4px 16px rgba(126, 200, 163, 0.4);
        }
        
        .study-btn-shuffle {
            background: linear-gradient(135deg, var(--accent-lavender) 0%, #9580c2 100%);
            color: #fff;
            box-shadow: 0 4px 16px rgba(180, 167, 214, 0.4);
        }
        
        .study-finish {
            text-align: center;
            padding: 2rem;
        }
        
        .study-finish-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        
        .study-finish h2 {
            background: var(--gradient-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.8rem;
            margin-bottom: 0.75rem;
        }
        
        .study-finish p {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
        }
        
        .study-empty {
            text-align: center;
            color: var(--text-muted);
            padding: 3rem;
        }
        
        .study-launch-btn {
            background: linear-gradient(135deg, #7ec8a3 0%, #5db382 100%) !important;
            color: #fff !important;
            box-shadow: 0 4px 16px rgba(126, 200, 163, 0.3) !important;
        }
        
        /* Tap hint */
        .tap-hint {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 1rem;
            opacity: 0.8;
        }
        
        /* Subject-specific colors */
        .subject-Anatomía .study-card-front { border-top: 4px solid #0288d1; }
        .subject-Farmacología .study-card-front { border-top: 4px solid #388e3c; }
        .subject-Enfermería .study-card-front { border-top: 4px solid #c2185b; }
        .subject-Fisiología .study-card-front { border-top: 4px solid #f57c00; }
        .subject-Patología .study-card-front { border-top: 4px solid #7b1fa2; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📖 FlashMed</h1>
        <p class="subtitle">Tarjetas de estudio para enfermería <span class="heart-decoration">💕</span></p>
        
        <!-- Instrucciones -->
        <div class="instructions">
            <p>💾 Los datos se guardan en tu navegador · ✨ Toca una tarjeta para marcar</p>
        </div>
        
        <!-- Stats -->
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="pendingCount">0</div>
                <div class="stat-label">Por estudiar</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="completedCount">0</div>
                <div class="stat-label">Completadas</div>
            </div>
        </div>
        
        <!-- Agregar tarea -->
        <div class="add-card">
            <h2>✨ Nueva Tarjeta</h2>
            <input type="text" id="questionInput" placeholder="Pregunta o concepto...">
            <textarea id="answerInput" placeholder="Respuesta o definición..."></textarea>
            <select id="subjectInput">
                <option value="General">General</option>
                <option value="Matemáticas">Matemáticas</option>
                <option value="Historia">Historia</option>
                <option value="Ciencias">Ciencias</option>
                <option value="Idioma">Idioma</option>
                <option value="Programación">Programación</option>
                <option value="Otro">Otro</option>
            </select>
            <button class="btn" onclick="addTask()">💕 Agregar Tarjeta</button>
        </div>
        
        <!-- Filtros -->
        <div class="filters">
            <button class="filter-btn active" onclick="filterTasks('all')">Todas</button>
            <button class="filter-btn" onclick="filterTasks('pending')">Por estudiar</button>
            <button class="filter-btn" onclick="filterTasks('completed')">Completadas</button>
        </div>
        
        <!-- Lista -->
        <div class="task-list" id="taskList">
            <div class="empty">
                <div class="empty-icon">📋</div>
                <p>No hay tarjetas aún.<br>¡Agrega tu primera tarjeta!</p>
            </div>
        </div>
    </div>
    
    <!-- Modal de edición -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <h2>✏️ Editar Tarjeta</h2>
            <input type="hidden" id="editId">
            <input type="text" id="editQuestion" placeholder="Pregunta o concepto...">
            <textarea id="editAnswer" placeholder="Respuesta o definición..."></textarea>
            <select id="editSubject">
                <option value="General">General</option>
                <option value="Matemáticas">Matemáticas</option>
                <option value="Historia">Historia</option>
                <option value="Ciencias">Ciencias</option>
                <option value="Idioma">Idioma</option>
                <option value="Programación">Programación</option>
                <option value="Otro">Otro</option>
            </select>
            <div class="modal-actions">
                <button class="btn" onclick="saveEdit()">💾 Guardar</button>
                <button class="btn btn-delete" onclick="closeModal()">✕</button>
            </div>
        </div>
    </div>

    <script>
        // ============== DATA MANAGEMENT ==============
        const STORAGE_KEY = 'flashmed_data';
        
        function loadTasks() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }
        
        function saveTasks(tasks) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
        }
        
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }
        
        // ============== TASK OPERATIONS ==============
        let currentFilter = 'all';
        
        function addTask() {
            const question = document.getElementById('questionInput').value.trim();
            const answer = document.getElementById('answerInput').value.trim();
            const subject = document.getElementById('subjectInput').value;
            
            if (!question) {
                alert('Por favor ingresa una pregunta');
                return;
            }
            
            const tasks = loadTasks();
            tasks.push({
                id: generateId(),
                question,
                answer,
                subject,
                completed: false,
                createdAt: new Date().toISOString()
            });
            
            saveTasks(tasks);
            
            document.getElementById('questionInput').value = '';
            document.getElementById('answerInput').value = '';
            
            renderTasks();
        }
        
        function toggleTask(id) {
            const tasks = loadTasks();
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveTasks(tasks);
                renderTasks();
            }
        }
        
        function deleteTask(id) {
            if (!confirm('¿Eliminar esta tarjeta?')) return;
            
            const tasks = loadTasks().filter(t => t.id !== id);
            saveTasks(tasks);
            renderTasks();
        }
        
        function openEditModal(id) {
            const task = loadTasks().find(t => t.id === id);
            if (!task) return;
            
            document.getElementById('editId').value = id;
            document.getElementById('editQuestion').value = task.question;
            document.getElementById('editAnswer').value = task.answer;
            document.getElementById('editSubject').value = task.subject;
            
            document.getElementById('editModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('editModal').classList.remove('active');
        }
        
        function saveEdit() {
            const id = document.getElementById('editId').value;
            const tasks = loadTasks();
            const task = tasks.find(t => t.id === id);
            
            if (task) {
                task.question = document.getElementById('editQuestion').value.trim();
                task.answer = document.getElementById('editAnswer').value.trim();
                task.subject = document.getElementById('editSubject').value;
                saveTasks(tasks);
                closeModal();
                renderTasks();
            }
        }
        
        function filterTasks(filter) {
            currentFilter = filter;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            renderTasks();
        }
        
        function getFilteredTasks() {
            const tasks = loadTasks();
            
            if (currentFilter === 'all') return tasks;
            if (currentFilter === 'pending') return tasks.filter(t => !t.completed);
            if (currentFilter === 'completed') return tasks.filter(t => t.completed);
            
            return tasks;
        }
        
        // ============== RENDER ==============
        function getTagClass(subject) {
            const map = {
                'Anatomía': 'anatomia',
                'Farmacología': 'farmacologia',
                'Enfermería': 'enfermeria',
                'Fisiología': 'fisiologia',
                'Patología': 'patologia'
            };
            return map[subject] || '';
        }
        
        function renderTasks() {
            const tasks = getFilteredTasks();
            const allTasks = loadTasks();
            const taskList = document.getElementById('taskList');
            
            document.getElementById('totalCount').textContent = allTasks.length;
            document.getElementById('pendingCount').textContent = allTasks.filter(t => !t.completed).length;
            document.getElementById('completedCount').textContent = allTasks.filter(t => t.completed).length;
            
            if (tasks.length === 0) {
                taskList.innerHTML = `
                    <div class="empty">
                        <div class="empty-icon">📋</div>
                        <p>${currentFilter === 'all' ? 'No hay tarjetas aún.<br>¡Agrega tu primera tarjeta!' : 'No hay tarjetas en esta categoría'}</p>
                    </div>
                `;
                return;
            }
            
            const pendingCount = allTasks.filter(t => !t.completed).length;
            
            taskList.innerHTML = tasks.map(task => `
                <div class="task ${task.completed ? 'completed' : ''}">
                    <div class="task-checkbox" onclick="toggleTask('${task.id}')">
                        ${task.completed ? '✓' : ''}
                    </div>
                    <div class="task-content" onclick="toggleTask('${task.id}')">
                        <div class="task-question">${escapeHtml(task.question)}</div>
                        ${task.answer ? `<div class="task-answer">${escapeHtml(task.answer)}</div>` : ''}
                        <div class="task-meta">
                            <span class="task-tag ${getTagClass(task.subject)}">${task.subject}</span>
                        </div>
                    </div>
                    <div class="task-actions">
                        <button class="task-btn" onclick="openEditModal('${task.id}')" title="Editar">✏️</button>
                        <button class="task-btn" onclick="deleteTask('${task.id}')" title="Eliminar">🗑️</button>
                    </div>
                </div>
            `).join('');
            
            // Study launch button
            const existingStudyBtn = document.querySelector('.study-launch-btn');
            if (existingStudyBtn) existingStudyBtn.remove();
            
            if (pendingCount > 0) {
                const statsDiv = document.querySelector('.stats');
                const studyLaunchBtn = document.createElement('button');
                studyLaunchBtn.className = 'btn study-launch-btn';
                studyLaunchBtn.textContent = `📖 Estudiar ${pendingCount} tarjetas`;
                studyLaunchBtn.onclick = () => startStudyMode();
                statsDiv.parentNode.insertBefore(studyLaunchBtn, statsDiv.nextSibling);
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ============== KEYBOARD SHORTCUTS ==============
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                const active = document.activeElement;
                if (active.id === 'questionInput' || active.id === 'answerInput') {
                    addTask();
                }
            }
            if (e.key === 'Escape') {
                closeModal();
                closeStudyMode();
            }
        });
        
        // ============== STUDY MODE ==============
        let studyTasks = [];
        let studyIndex = 0;
        let isFlipped = false;

        function startStudyMode(shuffle = false) {
            const tasks = loadTasks().filter(t => !t.completed);
            
            if (tasks.length === 0) {
                alert('No hay tarjetas para estudiar');
                return;
            }
            
            studyTasks = shuffle ? [...tasks].sort(() => Math.random() - 0.5) : [...tasks];
            studyIndex = 0;
            isFlipped = false;
            
            document.getElementById('studyTitle').textContent = shuffle ? '🔀 Estudio Aleatorio' : '📖 Modo Estudio';
            document.getElementById('studyModal').classList.add('active');
            
            renderStudyCard();
        }

        function renderStudyCard() {
            const container = document.getElementById('studyContainer');
            const task = studyTasks[studyIndex];
            const total = studyTasks.length;
            
            document.getElementById('studyCounter').textContent = `${studyIndex + 1} / ${total}`;
            document.getElementById('studyProgressFill').style.width = `${((studyIndex + 1) / total) * 100}%`;
            
            if (!task) {
                container.innerHTML = `
                    <div class="study-finish">
                        <div class="study-finish-icon">🎉</div>
                        <h2>¡Terminaste!</h2>
                        <p>Completaste las ${total} tarjetas</p>
                        <button class="btn" onclick="closeStudyMode()">← Volver</button>
                    </div>
                `;
                document.getElementById('studyProgressFill').style.width = '100%';
                return;
            }
            
            isFlipped = false;
            
            container.innerHTML = `
                <div class="study-card-wrapper">
                    <div class="study-card subject-${task.subject}" id="studyCard" onclick="flipCard()">
                        <div class="study-card-front">
                            <span class="study-card-label">Pregunta</span>
                            <div class="study-card-question">${escapeHtml(task.question)}</div>
                            <div class="tap-hint">✨ Toca para ver la respuesta</div>
                        </div>
                        <div class="study-card-back">
                            <span class="study-card-label">Respuesta</span>
                            <div class="study-card-answer">${escapeHtml(task.answer)}</div>
                            <div class="study-card-divider"></div>
                        </div>
                    </div>
                </div>
                <div class="study-actions">
                    <button class="btn study-btn-next" onclick="event.stopPropagation(); nextCard()">Siguiente →</button>
                    <button class="btn study-btn-shuffle" onclick="event.stopPropagation(); startStudyMode(true)">🔀 Aleatorio</button>
                </div>
            `;
        }
        
        function flipCard() {
            const card = document.getElementById('studyCard');
            if (card) {
                isFlipped = !isFlipped;
                card.classList.toggle('flipped', isFlipped);
            }
        }
        
        function nextCard() {
            studyIndex++;
            renderStudyCard();
        }

        function closeStudyMode() {
            document.getElementById('studyModal').classList.remove('active');
            renderTasks();
        }

        // ============== INIT ==============
        renderTasks();
    </script>

    <!-- Study Mode Modal -->
    <div class="study-modal" id="studyModal">
        <div class="study-header">
            <h2 id="studyTitle">📖 Modo Estudio</h2>
            <button class="study-close" onclick="closeStudyMode()">✕</button>
        </div>
        <div class="study-progress">
            <span class="study-counter" id="studyCounter">0 / 0</span>
            <div class="study-progress-bar">
                <div class="study-progress-fill" id="studyProgressFill" style="width: 0%"></div>
            </div>
        </div>
        <div class="study-container" id="studyContainer">
        </div>
    </div>
</body>
</html>
